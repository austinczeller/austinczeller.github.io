# ---- Research: Current Projects -------------------------

- id: cumulative-effects-yukon
  type: research
  status: current
  year: "Now"
  title: "Cumulative effects influence northern boreal breeding bird abundances in a mining impacted landscape"
  authors: "With M. Brown, D. Yip, E. M. Bayne, A. McCulley, M. Hornseth, C. L. Mahon, C. Mantyka-Pringle"
  description: "We are evaluating the various effects mining, particularly placer mining, has on various species of birds in central Yukon, Canada. We have determined individual relationships between species and landscape features, identified critical disturbance thresholds, and characterized habitat types that are more vulnerable or resilient to disturbance."

- id: piwo-habitat-models
  type: research
  status: current
  year: "Now"
  title: "Improving habitat models for Pileated Woodpeckers: The roles of occupancy, intensity of use, land cover, and scale"
  authors: "With A. De Rosa, L. Leston, C. L. Mahon, E. M. Bayne"
  description: "We are determining the best models for predicting Pileated Woodpecker habitat use in Alberta, Canada, comparing how occupancy and intensity-of-use models predict habitat use and how land cover data and spatial scale affect model performance."

